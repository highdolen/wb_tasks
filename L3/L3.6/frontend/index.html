<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>SalesTracker</title>
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<h1>Sales Tracker</h1>

<div class="container">

  <h2>Add Transaction</h2>
  <form id="itemForm">
    <select id="type">
      <option value="income">Доход</option>
      <option value="expense">Расход</option>
    </select>

    <input id="amount" type="number" step="0.01" placeholder="Amount" required />
    <input id="category" type="text" placeholder="Category" />

    <label>Дата транзакции</label>
    <input id="createdAt" type="datetime-local" required />

    <button type="submit">Add</button>
  </form>

  <h2>Transactions</h2>

  <button id="toggleBtn" onclick="toggleTable()">Показать транзакции</button>
  <button onclick="loadItems()">Refresh</button>

  <h3>Filters</h3>

  <select id="filterType">
    <option value="">Все</option>
    <option value="income">Доход</option>
    <option value="expense">Расход</option>
  </select>

  <input id="filterCategory" placeholder="Category">

  <input type="date" id="filterFrom">
  <input type="date" id="filterTo">

  <button type="button" onclick="applyFilters()">Применить</button>

  <div id="itemsBlock" style="display:none;">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Type</th>
          <th>Amount</th>
          <th>Category</th>
          <th>Date</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="itemsTable"></tbody>
    </table>
  </div>

  <h2>Analytics</h2>

  <div class="analytics-controls">
    <label>Период отчета:</label>

    <div class="date-range">
      <div>
        <span>От</span>
        <input type="date" id="fromDate">
      </div>
      <div>
        <span>До</span>
        <input type="date" id="toDate">
      </div>
    </div>

    <label>Группировка</label>
    <select id="groupBy">
      <option value="day">По дням</option>
      <option value="week">По неделям</option>
      <option value="category">По категориям</option>
    </select>

    <button onclick="loadAnalytics()">Получить аналитику</button>
    <button onclick="exportCSV()">Скачать CSV</button>
  </div>

  <pre id="analyticsResult"></pre>

</div>

<script src="/static/app.js"></script>
</body>
</html>
